# Docker Compose · mipiacetpv producción
#
# Stack:
#   postgres        Base de datos (datos persistentes en named volume)
#   redis           Cola BullMQ + cache
#   api             Backend Fastify
#   worker          BullMQ workers
#   static-publish  Init container que copia los dists de admin/tpv al volume
#                   compartido con caddy. Se ejecuta una vez por deploy.
#   caddy           Reverse proxy + SSL Let's Encrypt + estáticos
#
# Recursos pensados para VPS KVM 1 (4 GB RAM, 1 vCPU):
#   postgres   1g
#   redis      256m
#   api        1.5g  (Fastify + workspace tsx + pdf-lib en memoria)
#   worker     768m  (BullMQ + sync jobs Holded)
#   caddy      128m
#   static     pico  (sólo cp once)
#   ── overhead SO + buffers ──────  ~400m
#   ─────────────────────────────────  Total ≈ 4 GB

name: mipiacetpv

# v1.5-consistencia-A §5.1 · rotación de logs: sin esto, json-file crece
# sin límite y acaba llenando el disco del VPS. 10 MB × 3 ficheros por
# servicio (~180 MB peor caso con 6 servicios).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mipiacetpv-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - mipiacetpv

  redis:
    image: redis:7-alpine
    container_name: mipiacetpv-redis
    restart: unless-stopped
    logging: *default-logging
    # appendonly yes → persistencia AOF (jobs en cola sobreviven reinicios).
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - mipiacetpv

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api
    image: mipiacetpv/api:latest
    container_name: mipiacetpv-api
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      HOLDED_KEY_ENCRYPTION_SECRET: ${HOLDED_KEY_ENCRYPTION_SECRET}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL}
      PUBLIC_TICKET_URL: ${PUBLIC_TICKET_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SUPER_ADMIN_FROM_EMAIL: ${SUPER_ADMIN_FROM_EMAIL}
      SUPER_ADMIN_REPLY_TO_EMAIL: ${SUPER_ADMIN_REPLY_TO_EMAIL}
      PRODUCT_IMAGE_CACHE_DIR: /var/cache/mipiacetpv/product-images
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      # B-ProductImages: el API expone `/api/admin/product-images/...` u
      # otros endpoints internos que tocan el disco; el worker hace la
      # escritura primaria. Compartimos el volumen en RW para ambos.
      - product_images:/var/cache/mipiacetpv/product-images
    deploy:
      resources:
        limits:
          memory: 1500m
    networks:
      - mipiacetpv

  worker:
    image: mipiacetpv/api:latest
    container_name: mipiacetpv-worker
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    command: ["pnpm", "--filter", "@mipiacetpv/api", "exec", "tsx", "src/workers/index.ts"]
    # v1.5-consistencia-A §5.3: el worker escribe `worker:heartbeat` en
    # Redis cada 30 s (TTL 120 s); este check falla si la key no existe
    # → Docker detecta worker colgado y lo reinicia.
    healthcheck:
      test:
        [
          "CMD",
          "/repo/node_modules/.bin/tsx",
          "/repo/apps/api/src/scripts/check-worker-heartbeat.ts",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      HOLDED_KEY_ENCRYPTION_SECRET: ${HOLDED_KEY_ENCRYPTION_SECRET}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL}
      PUBLIC_TICKET_URL: ${PUBLIC_TICKET_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SUPER_ADMIN_FROM_EMAIL: ${SUPER_ADMIN_FROM_EMAIL}
      SUPER_ADMIN_REPLY_TO_EMAIL: ${SUPER_ADMIN_REPLY_TO_EMAIL}
      PRODUCT_IMAGE_CACHE_DIR: /var/cache/mipiacetpv/product-images
    volumes:
      # Worker primario para B-ProductImages: descarga, valida y escribe
      # los binarios. Mismo volumen que el API y Caddy.
      - product_images:/var/cache/mipiacetpv/product-images
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - mipiacetpv

  # Init container que extrae los dists del Dockerfile (target=static) al
  # volumen compartido con caddy. Se ejecuta una vez por deploy y termina.
  static-publish:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: static
    container_name: mipiacetpv-static-publish
    logging: *default-logging
    volumes:
      - static_files:/output
    command: sh -c "rm -rf /output/admin /output/tpv && cp -r /export/admin /export/tpv /output/ && echo 'estáticos publicados'"
    restart: "no"
    networks:
      - mipiacetpv

  caddy:
    image: caddy:2-alpine
    container_name: mipiacetpv-caddy
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
      - static-publish
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Submount obligatorio: si montamos static_files en /srv (root),
      # Docker no puede crear el subdir /srv/product-images porque el
      # padre quedaría read-only y falla con `make mountpoint`. Anidamos
      # bajo /srv/static. El Caddyfile ya apunta a /srv/static/{tpv,admin}.
      - static_files:/srv/static:ro
      # B-ProductImages: imágenes de producto en read-only para Caddy.
      # El worker es quien escribe; Caddy sólo sirve con cache HTTP de
      # 30 días (ver Caddyfile, bloque handle_path /product-images/*).
      - product_images:/srv/product-images:ro
    deploy:
      resources:
        limits:
          memory: 128m
    networks:
      - mipiacetpv

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  static_files:
  # B-ProductImages: cache local de imágenes de producto desde Holded.
  # Compartido entre api (escribe ocasional), worker (escribe primario)
  # y caddy (lee). Persiste reinicios; el sync incremental detecta URLs
  # nuevas y el worker re-descarga.
  product_images:

networks:
  mipiacetpv:
    driver: bridge
