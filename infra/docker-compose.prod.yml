# Docker Compose · mipiacetpv producción
#
# Stack:
#   postgres        Base de datos (datos persistentes en named volume)
#   redis           Cola BullMQ + cache
#   api             Backend Fastify
#   worker          BullMQ workers
#   static-publish  Init container que copia los dists de admin/tpv al volume
#                   compartido con caddy. Se ejecuta una vez por deploy.
#   caddy           Reverse proxy + SSL Let's Encrypt + estáticos
#
# Recursos pensados para VPS KVM 1 (4 GB RAM, 1 vCPU):
#   postgres   1g
#   redis      256m
#   api        1.5g  (Fastify + workspace tsx + pdf-lib en memoria)
#   worker     768m  (BullMQ + sync jobs Holded)
#   caddy      128m
#   static     pico  (sólo cp once)
#   ── overhead SO + buffers ──────  ~400m
#   ─────────────────────────────────  Total ≈ 4 GB

name: mipiacetpv

services:
  postgres:
    image: postgres:16-alpine
    container_name: mipiacetpv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - mipiacetpv

  redis:
    image: redis:7-alpine
    container_name: mipiacetpv-redis
    restart: unless-stopped
    # appendonly yes → persistencia AOF (jobs en cola sobreviven reinicios).
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - mipiacetpv

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api
    image: mipiacetpv/api:latest
    container_name: mipiacetpv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      HOLDED_KEY_ENCRYPTION_SECRET: ${HOLDED_KEY_ENCRYPTION_SECRET}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL}
      PUBLIC_TICKET_URL: ${PUBLIC_TICKET_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SUPER_ADMIN_FROM_EMAIL: ${SUPER_ADMIN_FROM_EMAIL}
      SUPER_ADMIN_REPLY_TO_EMAIL: ${SUPER_ADMIN_REPLY_TO_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1500m
    networks:
      - mipiacetpv

  worker:
    image: mipiacetpv/api:latest
    container_name: mipiacetpv-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: ["pnpm", "--filter", "@mipiacetpv/api", "exec", "tsx", "src/workers/index.ts"]
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      HOLDED_KEY_ENCRYPTION_SECRET: ${HOLDED_KEY_ENCRYPTION_SECRET}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL}
      PUBLIC_TICKET_URL: ${PUBLIC_TICKET_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SUPER_ADMIN_FROM_EMAIL: ${SUPER_ADMIN_FROM_EMAIL}
      SUPER_ADMIN_REPLY_TO_EMAIL: ${SUPER_ADMIN_REPLY_TO_EMAIL}
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - mipiacetpv

  # Init container que extrae los dists del Dockerfile (target=static) al
  # volumen compartido con caddy. Se ejecuta una vez por deploy y termina.
  static-publish:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: static
    container_name: mipiacetpv-static-publish
    volumes:
      - static_files:/output
    command: sh -c "rm -rf /output/admin /output/tpv && cp -r /export/admin /export/tpv /output/ && echo 'estáticos publicados'"
    restart: "no"
    networks:
      - mipiacetpv

  caddy:
    image: caddy:2-alpine
    container_name: mipiacetpv-caddy
    restart: unless-stopped
    depends_on:
      - api
      - static-publish
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_files:/srv:ro
    deploy:
      resources:
        limits:
          memory: 128m
    networks:
      - mipiacetpv

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  static_files:

networks:
  mipiacetpv:
    driver: bridge
