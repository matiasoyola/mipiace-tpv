# CI de mipiacetpv (v1.5-consistencia-A · Lote 2; publish v1.5-B · Lote 1).
#
# Job `ci`: replica lo que hace el Dockerfile en build — que es donde
# revientan los deploys: install congelado, prisma generate, typecheck
# de todos los targets, suite de tests y builds de Vite.
#
# La suite NO necesita servicios (Redis/Postgres van mockeados desde el
# Lote 1); si algún test futuro necesita Redis real, añadir `services:
# redis:7` aquí — preferible mantener la suite autocontenida.
#
# Job `publish` (v1.5-B · Lote 1): sólo en push a master y tras `ci` en
# verde. Construye con buildx las imágenes `api` y `static-publish` y
# las publica en GHCR con dos tags: `<sha-corto>` (inmutable, para
# rollback) y `latest`. El VPS ya no construye nada — `infra/deploy.sh`
# hace pull y recrea (rollback = IMAGE_TAG=<sha-anterior> ./deploy.sh).

name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 9.12.0 exacto — lo lee del campo `packageManager` del
      # package.json raíz (misma fuente de verdad que corepack en el
      # Dockerfile).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20 + cache pnpm store
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @mipiacetpv/db run generate

      - name: Typecheck API
        run: pnpm --filter @mipiacetpv/api exec tsc --noEmit

      - name: Typecheck packages
        run: |
          for pkg in packages/db packages/escpos-builder packages/holded-client packages/ticket-model packages/ticket-pdf packages/util-validation; do
            echo "== $pkg"
            (cd "$pkg" && pnpm exec tsc --noEmit)
          done

      # Los frontends usan project references (`tsc -b`), igual que su
      # script de build. Caza los errores de tipos antes de la build.
      - name: Typecheck tpv-web
        run: pnpm --filter @mipiacetpv/tpv-web exec tsc -b

      - name: Typecheck admin
        run: pnpm --filter @mipiacetpv/admin exec tsc -b

      - name: Tests
        run: pnpm test

      - name: Build admin (Vite)
        run: pnpm --filter @mipiacetpv/admin build

      - name: Build tpv-web (Vite)
        run: pnpm --filter @mipiacetpv/tpv-web build

  # v1.5-consistencia-B · Lote 1: publicación de imágenes en GHCR.
  # Sólo en push a master (las ramas validan con `ci` pero no publican).
  # GITHUB_TOKEN basta para escribir en ghcr.io del mismo repo/owner
  # gracias al bloque `permissions`.
  publish:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # VITE_BUILD_HASH = release de Sentry en los frontends (Lote 2) y
      # hash determinista del SW. VITE_SENTRY_DSN es opcional: sin el
      # secret, llega vacío y Sentry queda en no-op (gated por DSN).
      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          target: api
          push: true
          tags: |
            ghcr.io/matiasoyola/mipiacetpv-api:${{ steps.meta.outputs.sha }}
            ghcr.io/matiasoyola/mipiacetpv-api:latest
          build-args: |
            VITE_BUILD_HASH=${{ steps.meta.outputs.sha }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push static-publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          target: static
          push: true
          tags: |
            ghcr.io/matiasoyola/mipiacetpv-static-publish:${{ steps.meta.outputs.sha }}
            ghcr.io/matiasoyola/mipiacetpv-static-publish:latest
          build-args: |
            VITE_BUILD_HASH=${{ steps.meta.outputs.sha }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
